request:
  feature_name: "Workout Plan Creation"
  target_view:
    file_path: "docs/views/workout-plan-create.view.md"
    route: "/workout-plans/new"
    auth: "authenticated"
  app_shell_path: "docs/app-shell.md"
  backend_source_of_truth:
    endpoints:
      - method: "POST"
        path: "/api/workout-plans"
        description: "Create workout plan."
      - method: "GET"
        path: "/api/workout-plan-templates"
        description: "List plan templates."
    contracts:
      request_fields:
        - name: "name"
          type: "string"
          required: true
          min_length: 3
          max_length: 100
        - name: "goal"
          type: "string"
          required: true
        - name: "templateId"
          type: "uuid"
          required: false
      response_fields:
        - name: "id"
          type: "uuid"
        - name: "status"
          type: "string"
          allowed_values: ["draft", "active"]
    business_rules:
      - "Plan name must be unique per coach."
      - "Template cannot be archived."
    state_model:
      states: ["idle", "submitting", "created", "validation_failed", "conflict_failed"]
      transitions:
        - from: "idle"
          action: "submit"
          to: "submitting"
        - from: "submitting"
          event: "201_created"
          to: "created"
        - from: "submitting"
          event: "400_validation"
          to: "validation_failed"
        - from: "submitting"
          event: "409_conflict"
          to: "conflict_failed"
    errors:
      - http_status: 400
        code: "VALIDATION_ERROR"
        presentation: "inline_and_form_summary"
      - http_status: 409
        code: "PLAN_NAME_ALREADY_EXISTS"
        presentation: "inline_name_field"
  optional:
    existing_view_spec: null
    existing_screen_path: "app/src/screens/WorkoutPlanCreateScreen.tsx"
    reusable_components:
      - "FormField"
      - "PrimaryButton"
      - "InlineErrorText"
    navigation_hints:
      success_target_route: "/workout-plans/:id"
      cancel_target_route: "/workout-plans"
